name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse host and path from SSH_PATH
        id: parse
        run: |
          SSH_PATH="${{ vars.SSH_PATH }}"
          SSH_HOST="${SSH_PATH%%:*}"
          echo "host=${SSH_HOST}" >> $GITHUB_OUTPUT
          echo "hostname=${SSH_HOST#*@}" >> $GITHUB_OUTPUT
          echo "path=${SSH_PATH#*:}" >> $GITHUB_OUTPUT

      - name: Set up SSH
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_ed25519
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          host="${{ steps.parse.outputs.hostname }}"
          ok=
          for attempt in 1 2 3 4 5; do
            keys="$(ssh-keyscan -T 15 -H "$host" 2>/dev/null || true)"
            if [ -n "$keys" ]; then
              echo "$keys" >> ~/.ssh/known_hosts
              echo "Collected SSH host key for $host (attempt $attempt)"
              ok=1
              break
            fi
            echo "ssh-keyscan attempt $attempt for $host returned nothing; retrying in 5s..."
            sleep 5
          done
          if [ -z "$ok" ]; then
            echo "::error::Failed to collect SSH host key for $host after 5 attempts"
            exit 1
          fi

      - name: Sync repository to server
        run: |
          ssh ${{ steps.parse.outputs.host }} "mkdir -p ${{ steps.parse.outputs.path }}"
          rsync -az --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.env' \
            --exclude='data/' \
            --exclude='node_modules/' \
            ./ ${{ steps.parse.outputs.host }}:${{ steps.parse.outputs.path }}/

      - name: Deploy
        run: |
          ssh ${{ steps.parse.outputs.host }} "
            cd ${{ steps.parse.outputs.path }} &&
            mkdir -p data/mysql data/pdfs data/uploads data/photon &&
            docker compose pull --quiet 2>/dev/null || true &&
            docker compose up -d --build --force-recreate --remove-orphans
          "

# Log-Rotation für alle Services (json-file wächst sonst unbegrenzt).
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  # Reverse-Proxy mit automatischem HTTPS (Let's Encrypt).
  # Läuft nur in Produktion: aktiviert über COMPOSE_PROFILES=production
  # (siehe .env). Terminiert TLS für ${APP_DOMAIN} und reicht den Traffic
  # intern an die Node-App auf Port 3000 weiter. Die Zertifikate liegen im
  # Volume caddy_data, damit Let's Encrypt sie nicht bei jedem Neustart neu
  # ausstellt (Rate-Limits!).
  caddy:
    image: caddy:2-alpine
    profiles: [production]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    depends_on:
      - app
    restart: unless-stopped
    logging: *default-logging

  app:
    build:
      context: .
      dockerfile: docker/node/Dockerfile
    # Dev: "watch" (Hot-Reload). Produktion: TSX_WATCH= (leer) in der .env setzen,
    # sonst restartet jeder Deploy-rsync die App mehrfach mit Mischständen.
    command: sh -c "exec tsx $${TSX_WATCH-watch} src/server.ts"
    ports:
      # Produktion: APP_BIND=127.0.0.1:3000 setzen, damit Port 3000 nicht am
      # Caddy vorbei öffentlich erreichbar ist.
      - "${APP_BIND:-3000}:3000"
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./resources:/app/resources
      - ./migrations:/app/migrations
      - ./data/pdfs:/app/data/pdfs
      - ./data/uploads:/app/data/uploads
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  db:
    image: mariadb:11
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ./src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 15
    restart: unless-stopped
    logging: *default-logging

  mail:
    image: axllent/mailpit
    ports:
      # Produktion: MAILPIT_BIND=127.0.0.1:8025 (UI nicht öffentlich; wird bei
      # MAIL_DRIVER=smtp ohnehin nicht genutzt).
      - "${MAILPIT_BIND:-8025}:8025"
    restart: unless-stopped
    logging: *default-logging

  # OpenStreetMap-Geocoder für die Adresssuche (Autovervollständigung).
  # Lädt beim ersten Start automatisch den fertigen Deutschland-Index
  # (mehrere GB) herunter und entpackt ihn nach ./data/photon. Das dauert
  # einige Minuten; solange liefert /api/geo/search einfach keine Treffer.
  # REGION akzeptiert "germany"/"de" oder z.B. "planet" bzw. mehrere Länder.
  photon:
    image: rtuszik/photon-docker:latest
    environment:
      - REGION=germany
      - UPDATE_STRATEGY=PARALLEL
    volumes:
      - ./data/photon:/photon/data
    # Port nur bei Bedarf zum Debuggen freigeben – die App spricht Photon
    # intern über den Namen "photon:2322" an.
    # ports:
    #   - "2322:2322"
    restart: unless-stopped
    logging: *default-logging

  # OSM-Raster-Tileserver (nur Hessen, da aktuell nur Frankfurt unterstützt wird).
  # Rendert Karten-Kacheln, die die App same-origin über /tiles/{z}/{x}/{y}.png
  # ausliefert (Proxy in src/routes/tiles.ts) – daher kein Port nach außen.
  #
  # Auto-Import beim ersten Start: Fehlt der Import-Marker im Volume, läuft
  # einmalig der Hessen-Import (baut die PostGIS-Render-DB, ~10–30 Min), danach
  # der Tileserver. Dadurch funktioniert auch ein frisches `docker compose up -d`
  # (inkl. automatischem Deploy) ohne manuellen Zwischenschritt; Folge-Deploys
  # überspringen den Import (Marker liegt im persistenten Volume osm-tile-data).
  # Während des Imports liefert /tiles leere Kacheln – die App blockiert nicht.
  tileserver:
    image: overv/openstreetmap-tile-server:latest
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        if [ ! -f /data/database/planet-import-complete ]; then
          # Kein Abschluss-Marker => evtl. abgebrochener Import. Ein halb
          # angelegtes Cluster (Rolle "renderer"/DB "gis" existieren bereits)
          # ließe den Re-Import an `createuser renderer` scheitern
          # ("role already exists" -> Crash-Schleife). Daher das unvollständige
          # Postgres-Verzeichnis verwerfen und sauber von vorn importieren.
          echo "Kein Import-Marker – räume evtl. unvollständigen Import-Stand und importiere neu ..."
          rm -rf /data/database/postgres
          /run.sh import
        fi
        exec /run.sh run
    environment:
      - DOWNLOAD_PBF=https://download.geofabrik.de/europe/germany/hessen-latest.osm.pbf
      - DOWNLOAD_POLY=https://download.geofabrik.de/europe/germany/hessen.poly
    volumes:
      - osm-tile-data:/data/database/
      - osm-tile-cache:/data/tiles/
    shm_size: 512m
    restart: unless-stopped
    logging: *default-logging

  # Kennzeichenerkennung (YOLOv11 + PaddleOCR) für hochgeladene Beweisfotos.
  # Läuft in Produktion automatisch mit; in der Entwicklung opt-in über
  # COMPOSE_PROFILES=alpr (plus ALPR_ENABLED=on in der .env). Die App spricht
  # den Dienst intern über "alpr:8000" an und degradiert ohne ihn graceful
  # (Kennzeichen-Feld bleibt dann einfach leer). Kein Port nach außen; die
  # Fotos verlassen den Host nie. CPU-only, Modelle sind ins Image gebacken.
  alpr:
    build: ./docker/alpr
    profiles: [production, alpr]
    mem_limit: 2g
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

volumes:
  caddy_data:
  caddy_config:
  osm-tile-data:
  osm-tile-cache:
